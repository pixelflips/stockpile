<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>stockpile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/style.css">
</head>

<body>

  <!-- =========================================================
       HEADER
       Contains the app logo, live stats, and control bar.
       ========================================================= -->
  <header class="header">
    <h1 class="header__logo">stock<span>pile</span></h1>

    <!-- Package count summary — populated by JS -->
    <span class="header__stats" id="stats" aria-live="polite"></span>

    <!-- Theme toggle -->
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
      <!-- Sun icon — visible in dark mode, click to switch to light -->
      <svg class="theme-toggle__sun" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="5" />
        <line x1="12" y1="1"  x2="12" y2="3"  />
        <line x1="12" y1="21" x2="12" y2="23" />
        <line x1="4.22" y1="4.22"  x2="5.64" y2="5.64"  />
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
        <line x1="1"  y1="12" x2="3"  y2="12" />
        <line x1="21" y1="12" x2="23" y2="12" />
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
        <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22" />
      </svg>

      <!-- Moon icon — visible in light mode, click to switch to dark -->
      <svg class="theme-toggle__moon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
      </svg>
    </button>
  </header>

  <!-- =========================================================
       FILTER NAV
       Type-filter pills are injected here by JS.
       ========================================================= -->
  <nav class="filters" id="filters" aria-label="Filter by package type"></nav>

  <!-- Heading row: title/description on left, sort+search on right -->
  <div class="grid-heading-row">
    <h2 class="grid-heading" id="grid-heading" aria-live="polite"></h2>
    <div class="grid-heading-row__actions">
      <select id="sort-select" class="sort-select" aria-label="Sort packages">
        <option value="az">A → Z</option>
        <option value="za">Z → A</option>
      </select>
      <input
        type="search"
        id="search-input"
        class="search-input"
        placeholder="Search..."
        aria-label="Search packages"
        autocomplete="off"
        spellcheck="false"
      />
    </div>
  </div>

  <!-- =========================================================
       MAIN CONTENT
       Two-column grid: package cards on the left,
       detail panel on the right.
       ========================================================= -->
  <!-- =========================================================
       EMPTY STATE
       Shown when no package data has been loaded yet.
       The [hidden] attribute is removed by JS when needed.
       ========================================================= -->
  <div class="empty-state" id="empty-state" hidden>
    <p class="empty-state__eyebrow">No dossier on file</p>
    <p class="empty-state__body">Run the scanner to build your package inventory.</p>
    <div class="empty-state__cmd">
      <span class="empty-state__prompt">$</span>
      <code>./stockpile</code>
    </div>
  </div>

  <main class="content">
    <!-- Package card grid — cards injected by JS -->
    <section class="grid" id="grid" aria-label="Package list"></section>
  </main>

  <!-- Detail dialog — opened by showModal() when a card is selected -->
  <dialog class="detail" id="detail" aria-label="Package details"></dialog>

  <script src="scripts/app.js"></script>

</body>
</html>
